# Catppuccin Mocha Theme Profile
# Full theme: labwc + GTK + rofi + sfwbar + zebar + mako + foot + qt + cursors

[meta]
name=Catppuccin Mocha
description=Warm dark theme with pastel colors
author=Catppuccin
version=2.0

# ============================================================
# Color Palette — single source of truth
# ============================================================
[colors]
base=#1e1e2e
mantle=#181825
crust=#11111b
surface0=#313244
surface1=#45475a
surface2=#585b70
overlay0=#6c7086
overlay1=#7f849c
overlay2=#9399b2
subtext0=#a6adc8
subtext1=#bac2de
text=#cdd6f4
lavender=#b4befe
blue=#89b4fa
sapphire=#74c7ec
sky=#89dceb
teal=#94e2d5
green=#a6e3a1
yellow=#f9e2af
peach=#fab387
maroon=#eba0ac
red=#f38ba8
mauve=#cba6f7
pink=#f5c2e7
flamingo=#f2cdcd
rosewater=#f5e0dc

# Derived / semantic aliases
color_bg=${base}
color_fg=${text}
color_accent=${blue}
color_urgent=${red}
color_warning=${yellow}
color_ok=${green}
color_surface=${surface1}
color_border=${surface2}
color_muted=${overlay0}

# ============================================================
# Labwc compositor
# ============================================================
[labwc]
themerc_active_bg=${surface0}
themerc_inactive_bg=${mantle}
themerc_active_text=${text}
themerc_inactive_text=${overlay0}
themerc_border=${surface1}
themerc_font=sans 10
themerc_height=28
cornerRadius=8
border_width=1
titlebar_layout=icon:iconify,max,close

# ============================================================
# GTK3
# ============================================================
[gtk3]
gtk_theme=Catppuccin-Mocha-Standard-Dark
icon_theme=Papirus-Dark
cursor_theme=Catppuccin-Mocha-Dark
cursor_size=24
button_layout=close,minimize,maximize:menu
color_scheme=prefer-dark
gtk_application_prefer_dark_theme=true
gtk_enable_animations=true
gtk_shell_shows_app_menu=false
gtk_shell_shows_menu_bar=false
gtk_menu_images=true
gtk_button_images=true
gtk_toolbar_style=GTK_TOOLBAR_BOTH_HORIZ
gtk_decoration_layout=:menu

# Font rendering
xft_antialias=1
xft_hinting=1
xft_hintstyle=hintfull
xft_rgba=rgb

# ============================================================
# GTK4
# ============================================================
[gtk4]
gtk_theme=Catppuccin-Mocha-Standard-Dark
icon_theme=Papirus-Dark
cursor_theme=Catppuccin-Mocha-Dark
cursor_size=24
color_scheme=prefer-dark
gtk_application_prefer_dark_theme=true
gtk_enable_animations=true
gtk_shell_shows_app_menu=false
gtk_shell_shows_menu_bar=false
gtk_decoration_layout=:menu
xft_antialias=1
xft_hinting=1
xft_hintstyle=hintfull
xft_rgba=rgb

# ============================================================
# Fonts
# ============================================================
[fonts]
interface=Noto Sans 10
document=Noto Sans 10
monospace=Noto Sans Mono 10

# ============================================================
# Rofi launcher
# ============================================================
[rofi]
bg=${base}
bg_alt=${surface0}
fg=${text}
fg_alt=${subtext0}
accent=${blue}
urgent=${red}
selected=${surface1}
border_color=${blue}
border_width=2
border_radius=12
font=Noto Sans 12
icon_theme=Papirus-Dark
terminal=foot

# ============================================================
# SFWBar panel
# ============================================================
[sfwbar]
bar_bg=${base}
bar_bg_alpha=0.92
bar_fg=${text}
bar_active=${blue}
bar_urgent=${red}
bar_border=${surface1}
bar_height=32
bar_radius=0
module_bg=${surface1}
module_bg_alpha=0.4
module_fg=${text}
module_radius=5
module_padding_h=8
module_padding_v=2
font_size=12
font_size_small=10

# ============================================================
# Zebar statusbar (CSS variables)
# ============================================================
[zebar]
bg=${crust}
bg_alpha=0.92
fg=${text}
accent=${blue}
green=${green}
red=${red}
yellow=${yellow}
teal=${teal}
surface=${surface1}
surface_alpha=0.4
text_muted=${overlay0}
border=${surface1}
border_alpha=0.6
font_size=12
font_size_small=10
bar_height=32
bar_radius=0

# ============================================================
# Mako notification daemon
# ============================================================
[mako]
bg_color=${surface0}
text_color=${text}
border_color=${blue}
border_radius=8
border_width=2
padding=12
max_width=350
font=Noto Sans 11
default_timeout=5000
markup=true
actions=true
max_visible=5

# ============================================================
# Foot terminal
# ============================================================
[foot]
term=foot
font=Noto Sans Mono:size=11
dpi=96
pad=12x12
shell=/bin/bash

# Terminal colors (normal)
color_regular_0=${base}
color_regular_1=${red}
color_regular_2=${green}
color_regular_3=${yellow}
color_regular_4=${blue}
color_regular_5=${mauve}
color_regular_6=${teal}
color_regular_7=${subtext1}

# Terminal colors (bright)
color_bright_0=${surface1}
color_bright_1=${red}
color_bright_2=${green}
color_bright_3=${yellow}
color_bright_4=${blue}
color_bright_5=${mauve}
color_bright_6=${teal}
color_bright_7=${text}

# Terminal colors (special)
color_foreground=${text}
color_background=${base}
color_cursor=${text}
color_cursor_text=${base}
color_selection=${surface1}
color_selection_foreground=${text}

# ============================================================
# Qt6ct
# ============================================================
[qt6ct]
theme=kvantum
icon_theme=Papirus-Dark
color_scheme=dark
standard_dialogs=xdg-desktop-portal
font=Noto Sans,10,-1,5,50,0,0,0,0,0
mono_font=Noto Sans Mono,10,-1,5,50,0,0,0,0,0

# ============================================================
# Kvantum
# ============================================================
[kvantum]
theme=Catppuccin-Mocha-Dark

# ============================================================
# Cursor
# ============================================================
[cursor]
theme=Catppuccin-Mocha-Dark
size=24
