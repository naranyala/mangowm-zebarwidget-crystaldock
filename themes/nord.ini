# Nord Theme Profile
# Arctic, north-bluish clean and elegant theme

[meta]
name=Nord
description=Arctic, north-bluish clean and elegant theme
author=Nord
version=2.0

[colors]
base=#2e3440
mantle=#272c36
crust=#1d2028
surface0=#3b4252
surface1=#434c5e
surface2=#4c566a
overlay0=#616e88
overlay1=#7b88a1
overlay2=#8893a7
subtext0=#a0a9b9
subtext1=#b4bdcc
text=#d8dee9
lavender=#b48ead
blue=#81a1c1
sapphire=#88c0d0
sky=#8fbcbb
teal=#88c0d0
green=#a3be8c
yellow=#ebcb8b
peach=#d08770
maroon=#bf616a
red=#bf616a
mauve=#b48ead
pink=#d8dee9
flamingo=#d8dee9
rosewater=#d8dee9

color_bg=${base}
color_fg=${text}
color_accent=${blue}
color_urgent=${red}
color_warning=${yellow}
color_ok=${green}
color_surface=${surface1}
color_border=${surface2}
color_muted=${overlay0}

[labwc]
themerc_active_bg=${surface0}
themerc_inactive_bg=${mantle}
themerc_active_text=${text}
themerc_inactive_text=${overlay0}
themerc_border=${surface1}
themerc_font=sans 10
themerc_height=28
cornerRadius=8
border_width=1
titlebar_layout=icon:iconify,max,close
osd_bg=${base}
osd_border=${surface1}
osd_text=${text}
osd_accent=${blue}
osd_inactive=${overlay0}
osd_switcher_width=600
osd_switcher_padding=8

[gtk3]
gtk_theme=Nordic-darker
icon_theme=elementary
cursor_theme=Catppuccin-Mocha-Dark
cursor_size=24
button_layout=close,minimize,maximize:menu
color_scheme=prefer-dark
gtk_application_prefer_dark_theme=true
gtk_enable_animations=true
gtk_shell_shows_app_menu=false
gtk_shell_shows_menu_bar=false
gtk_menu_images=true
gtk_button_images=true
gtk_toolbar_style=GTK_TOOLBAR_BOTH_HORIZ
gtk_decoration_layout=:menu
xft_antialias=1
xft_hinting=1
xft_hintstyle=hintfull
xft_rgba=rgb

[gtk4]
gtk_theme=Nordic-darker
icon_theme=elementary
cursor_theme=Catppuccin-Mocha-Dark
cursor_size=24
color_scheme=prefer-dark
gtk_application_prefer_dark_theme=true
gtk_enable_animations=true
gtk_shell_shows_app_menu=false
gtk_shell_shows_menu_bar=false
gtk_decoration_layout=:menu
xft_antialias=1
xft_hinting=1
xft_hintstyle=hintfull
xft_rgba=rgb

[fonts]
interface=Noto Sans 10
document=Noto Sans 10
monospace=Noto Sans Mono 10

[rofi]
bg=${base}
bg_alt=${surface0}
fg=${text}
fg_alt=${subtext0}
accent=${blue}
urgent=${red}
error=${red}
selected=${surface1}
border_color=${blue}
border_width=2
border_radius=12
font=Noto Sans 12
icon_theme=elementary
terminal=contour

[sfwbar]
bar_bg=${base}
bar_bg_alpha=0.92
bar_fg=${text}
bar_active=${blue}
bar_urgent=${red}
bar_border=${surface1}
bar_height=32
bar_radius=0
module_bg=${surface1}
module_bg_alpha=0.4
module_fg=${text}
module_radius=5
module_padding_h=8
module_padding_v=2
font_size=12
font_size_small=10


# ============================================================
# Cursor
# ============================================================
[cursor]
theme=Catppuccin-Mocha-Dark
size=24

# ============================================================
# Mako notification daemon
# ============================================================
[mako]
font=Noto Sans 10
max_width=400
max_visible=5
default_timeout=5000
markup=true
actions=true
padding=12
border_width=2
bg_color=${base}
text_color=${text}
border_color=${surface1}

# ============================================================
# Qt6ct
# ============================================================
[qt6ct]
icon_theme=elementary
color_scheme=dark
standard_dialogs=xdgdesktopportal
font=Noto Sans 10
mono_font=Noto Sans Mono 10

# ============================================================
# Neovim
# ============================================================
[nvim]
theme_pkg=shaunsingh/nord.nvim
theme_name=nord
flavour=

