# Rosé Pine Theme Profile
# All natural pine, faux fur and a bit of soho vibes

[meta]
name=Rosé Pine
description=All natural pine, faux fur and a bit of soho vibes
author=Rosé Pine
version=2.0

[colors]
base=#191724
mantle=#11111b
crust=#0d0c14
surface0=#262335
surface1=#31748f
surface2=#403d52
overlay0=#56526e
overlay1=#6e6a86
overlay2=#908caa
subtext0=#908caa
subtext1=#e0def4
text=#e0def4
lavender=#c4a7e7
blue=#9ccfd8
sapphire=#31748f
sky=#9ccfd8
teal=#9ccfd8
green=#31748f
yellow=#f6c177
peach=#ea9a97
maroon=#eb6f92
red=#eb6f92
mauve=#c4a7e7
pink=#eb6f92
flamingo=#e0def4
rosewater=#e0def4

color_bg=${base}
color_fg=${text}
color_accent=${blue}
color_urgent=${red}
color_warning=${yellow}
color_ok=${green}
color_surface=${surface1}
color_border=${surface2}
color_muted=${overlay0}

[labwc]
themerc_active_bg=${surface0}
themerc_inactive_bg=${mantle}
themerc_active_text=${text}
themerc_inactive_text=${overlay0}
themerc_border=${surface1}
themerc_font=sans 10
themerc_height=28
cornerRadius=8
border_width=1
titlebar_layout=icon:iconify,max,close
osd_bg=${base}
osd_border=${surface1}
osd_text=${text}
osd_accent=${blue}
osd_inactive=${overlay0}
osd_switcher_width=600
osd_switcher_padding=8

[gtk3]
gtk_theme=Rosé-Pine
icon_theme=elementary
cursor_theme=Catppuccin-Mocha-Dark
cursor_size=24
button_layout=close,minimize,maximize:menu
color_scheme=prefer-dark
gtk_application_prefer_dark_theme=true
gtk_enable_animations=true
gtk_shell_shows_app_menu=false
gtk_shell_shows_menu_bar=false
gtk_menu_images=true
gtk_button_images=true
gtk_toolbar_style=GTK_TOOLBAR_BOTH_HORIZ
gtk_decoration_layout=:menu
xft_antialias=1
xft_hinting=1
xft_hintstyle=hintfull
xft_rgba=rgb

[gtk4]
gtk_theme=Rosé-Pine
icon_theme=elementary
cursor_theme=Catppuccin-Mocha-Dark
cursor_size=24
color_scheme=prefer-dark
gtk_application_prefer_dark_theme=true
gtk_enable_animations=true
gtk_shell_shows_app_menu=false
gtk_shell_shows_menu_bar=false
gtk_decoration_layout=:menu
xft_antialias=1
xft_hinting=1
xft_hintstyle=hintfull
xft_rgba=rgb

[fonts]
interface=Noto Sans 10
document=Noto Sans 10
monospace=Noto Sans Mono 10

[rofi]
bg=${base}
bg_alt=${surface0}
fg=${text}
fg_alt=${subtext0}
accent=${blue}
urgent=${red}
error=${red}
selected=${surface1}
border_color=${blue}
border_width=2
border_radius=12
font=Noto Sans 12
icon_theme=elementary
terminal=contour

[sfwbar]
bar_bg=${base}
bar_bg_alpha=0.92
bar_fg=${text}
bar_active=${blue}
bar_urgent=${red}
bar_border=${surface1}
bar_height=32
bar_radius=0
module_bg=${surface1}
module_bg_alpha=0.4
module_fg=${text}
module_radius=5
module_padding_h=8
module_padding_v=2
font_size=12
font_size_small=10


# ============================================================
# Cursor
# ============================================================
[cursor]
theme=Catppuccin-Mocha-Dark
size=24

# ============================================================
# Mako notification daemon
# ============================================================
[mako]
font=Noto Sans 10
max_width=400
max_visible=5
default_timeout=5000
markup=true
actions=true
padding=12
border_width=2
bg_color=${base}
text_color=${text}
border_color=${surface1}

# ============================================================
# Qt6ct
# ============================================================
[qt6ct]
icon_theme=elementary
color_scheme=dark
standard_dialogs=xdgdesktopportal
font=Noto Sans 10
mono_font=Noto Sans Mono 10

# ============================================================
# Neovim
# ============================================================
[nvim]
theme_pkg=rose-pine/neovim
theme_name=rose-pine
flavour=

