# Rosé Pine Theme Profile
# All natural pine, faux fur and a bit of soho vibes

[meta]
name=Rosé Pine
description=All natural pine, faux fur and a bit of soho vibes
author=Rosé Pine
version=2.0

[colors]
base=#191724
mantle=#11111b
crust=#0d0c14
surface0=#262335
surface1=#31748f
surface2=#403d52
overlay0=#56526e
overlay1=#6e6a86
overlay2=#908caa
subtext0=#908caa
subtext1=#e0def4
text=#e0def4
lavender=#c4a7e7
blue=#9ccfd8
sapphire=#31748f
sky=#9ccfd8
teal=#9ccfd8
green=#31748f
yellow=#f6c177
peach=#ea9a97
maroon=#eb6f92
red=#eb6f92
mauve=#c4a7e7
pink=#eb6f92
flamingo=#e0def4
rosewater=#e0def4

color_bg=${base}
color_fg=${text}
color_accent=${blue}
color_urgent=${red}
color_warning=${yellow}
color_ok=${green}
color_surface=${surface1}
color_border=${surface2}
color_muted=${overlay0}

[labwc]
themerc_active_bg=${surface0}
themerc_inactive_bg=${mantle}
themerc_active_text=${text}
themerc_inactive_text=${overlay0}
themerc_border=${surface1}
themerc_font=sans 10
themerc_height=28
cornerRadius=8
border_width=1
titlebar_layout=icon:iconify,max,close

[gtk3]
gtk_theme=Rosé-Pine
icon_theme=Papirus-Dark
cursor_theme=Catppuccin-Mocha-Dark
cursor_size=24
button_layout=close,minimize,maximize:menu
color_scheme=prefer-dark
gtk_application_prefer_dark_theme=true
gtk_enable_animations=true
gtk_shell_shows_app_menu=false
gtk_shell_shows_menu_bar=false
gtk_menu_images=true
gtk_button_images=true
gtk_toolbar_style=GTK_TOOLBAR_BOTH_HORIZ
gtk_decoration_layout=:menu
xft_antialias=1
xft_hinting=1
xft_hintstyle=hintfull
xft_rgba=rgb

[gtk4]
gtk_theme=Rosé-Pine
icon_theme=Papirus-Dark
cursor_theme=Catppuccin-Mocha-Dark
cursor_size=24
color_scheme=prefer-dark
gtk_application_prefer_dark_theme=true
gtk_enable_animations=true
gtk_shell_shows_app_menu=false
gtk_shell_shows_menu_bar=false
gtk_decoration_layout=:menu
xft_antialias=1
xft_hinting=1
xft_hintstyle=hintfull
xft_rgba=rgb

[fonts]
interface=Noto Sans 10
document=Noto Sans 10
monospace=Noto Sans Mono 10

[rofi]
bg=${base}
bg_alt=${surface0}
fg=${text}
fg_alt=${subtext0}
accent=${blue}
urgent=${red}
selected=${surface1}
border_color=${blue}
border_width=2
border_radius=12
font=Noto Sans 12
icon_theme=Papirus-Dark
terminal=foot

[sfwbar]
bar_bg=${base}
bar_bg_alpha=0.92
bar_fg=${text}
bar_active=${blue}
bar_urgent=${red}
bar_border=${surface1}
bar_height=32
bar_radius=0
module_bg=${surface1}
module_bg_alpha=0.4
module_fg=${text}
module_radius=5
module_padding_h=8
module_padding_v=2
font_size=12
font_size_small=10

[zebar]
bg=${crust}
bg_alpha=0.92
fg=${text}
accent=${blue}
green=${green}
red=${red}
yellow=${yellow}
teal=${teal}
surface=${surface1}
surface_alpha=0.4
text_muted=${overlay0}
border=${surface1}
border_alpha=0.6
font_size=12
font_size_small=10
bar_height=32
bar_radius=0

[mako]
bg_color=${surface0}
text_color=${text}
border_color=${blue}
border_radius=8
border_width=2
padding=12
max_width=350
font=Noto Sans 11
default_timeout=5000
markup=true
actions=true
max_visible=5

[foot]
term=foot
font=Noto Sans Mono:size=11
dpi=96
pad=12x12
shell=/bin/bash
color_regular_0=${base}
color_regular_1=${red}
color_regular_2=${green}
color_regular_3=${yellow}
color_regular_4=${blue}
color_regular_5=${mauve}
color_regular_6=${teal}
color_regular_7=${subtext1}
color_bright_0=${surface1}
color_bright_1=${red}
color_bright_2=${green}
color_bright_3=${yellow}
color_bright_4=${blue}
color_bright_5=${mauve}
color_bright_6=${teal}
color_bright_7=${text}
color_foreground=${text}
color_background=${base}
color_cursor=${text}
color_cursor_text=${base}
color_selection=${surface1}
color_selection_foreground=${text}

[qt6ct]
theme=kvantum
icon_theme=Papirus-Dark
color_scheme=dark
standard_dialogs=xdg-desktop-portal
font=Noto Sans,10,-1,5,50,0,0,0,0,0
mono_font=Noto Sans Mono,10,-1,5,50,0,0,0,0,0

[kvantum]
theme=Rose-Pine

[cursor]
theme=Catppuccin-Mocha-Dark
size=24
