# Contour terminal — generated by theme-engine
# From: Catppuccin Mocha

platform_plugin: auto

renderer:
    backend: default

word_delimiters: " /\\()\"'-.,:;<>~!@#$%^&*+=[]{{}}~?|│"
extended_word_delimiters: " /\\()\"'-.,:;<>~!@#$%^&*+=[]{{}}~?|│"

read_buffer_size: 16384
pty_buffer_size: 1048576

default_profile: main
early_exit_threshold: 5
spawn_new_process: false
reflow_on_resize: true

bypass_mouse_protocol_modifier: Shift
mouse_block_selection_modifier: Control
on_mouse_select: CopyToSelectionClipboard

live_config: false

images:
    sixel_scrolling: true
    sixel_register_count: 4096
    max_width: 0
    max_height: 0

git_drawings:
    branch_style: thin
    arc_style: round
    merge_commit_style: bullet

box_arc_style: round
braille_style: circle

profiles:
    main:
        shell: /bin/bash
        arguments: []
        initial_working_directory: "~"
        escape_sandbox: true
        copy_last_mark_range_offset: 0
        show_title_bar: true
        size_indicator_on_resize: true
        fullscreen: false
        maximized: false
        search_mode_switch: true
        insert_after_yank: false

        bell:
            sound: default
            volume: 1
            alert: true

        terminal_id: VT525

        slow_scrolling_time: 100
        smooth_scrolling: true
        momentum_scrolling: true

        terminal_size:
            columns: 80
            lines: 25

        margins:
            horizontal: 0
            vertical: 0

        history:
            limit: 1000
            auto_scroll_on_update: true
            scroll_multiplier: 3

        scrollbar:
            position: Hidden
            hide_in_alt_screen: true

        mouse:
            hide_while_typing: true

        permissions:
            capture_buffer: allow
            change_font: allow
            display_host_writable_statusline: ask

        input_method_editor: true
        highlight_word_and_matches_on_double_click: true

        font:
            size: 11
            locator: Native
            text_shaping:
                engine: harfbuzz
            builtin_box_drawing: true
            max_fallback_count: 16
            render_mode: Gray
            strict_spacing: true
            regular:
                family: JetBrains Mono
                weight: Regular
                slant: Normal
                features: []
            emoji: emoji

        draw_bold_text_with_bright_colors: false
        blink_style: smooth

        cursor:
            shape: bar
            blinking: false
            blinking_interval: 500

        normal_mode:
            cursor:
                shape: block
                blinking: false
                blinking_interval: 500

        visual_mode:
            cursor:
                shape: block
                blinking: false
                blinking_interval: 500

        vi_mode_highlight_timeout: 100
        vi_mode_scrolloff: 8

        status_line:
            display: indicator
            position: Bottom
            sync_to_window_title: false
            indicator:
                left: " {InputMode:Bold,Color=#FFFF00}{TraceMode:Bold,Color=#FFFF00,Left= │ }"
                middle: "« {Title} »"
                right: "{HistoryLineCount:Faint,Color=#6c7086} │ {Clock:Bold}"

        background:
            opacity: 1
            blur: false

        colors: terminal

        hyperlink_decoration:
            normal: dotted-underline
            hover: underline

        option_as_alt: false

color_schemes:
    terminal:
        default:
            background: '#1e1e2e'
            foreground: '#cdd6f4'
            bright_foreground: '#ffffff'
            dimmed_foreground: '#6c7086'

        hyperlink_decoration:
            normal: '#f9e2af'
            hover: '#f38ba8'

        vi_mode_highlight:
            foreground: CellForeground
            foreground_alpha: 1
            background: '#89b4fa'
            background_alpha: 0.5

        vi_mode_cursorline:
            foreground: '#cdd6f4'
            foreground_alpha: 0.2
            background: '#45475a'
            background_alpha: 0.4

        selection:
            foreground: CellForeground
            foreground_alpha: 1
            background: '#45475a'
            background_alpha: 0.5

        search_highlight:
            foreground: CellBackground
            foreground_alpha: 1
            background: CellForeground
            background_alpha: 1

        search_highlight_focused:
            foreground: CellBackground
            foreground_alpha: 1
            background: CellForeground
            background_alpha: 1

        word_highlight_current:
            foreground: CellForeground
            foreground_alpha: 1
            background: '#45475a'
            background_alpha: 0.6

        word_highlight_other:
            foreground: CellForeground
            foreground_alpha: 1
            background: '#45475a'
            background_alpha: 0.5

        hint_label:
            foreground: '#1e1e2e'
            foreground_alpha: 1
            background: '#f9e2af'
            background_alpha: 1

        hint_match:
            foreground: CellForeground
            foreground_alpha: 1
            background: '#89b4fa'
            background_alpha: 0.35

        indicator_statusline:
            default:
                foreground: '#1e1e2e'
                background: '#89b4fa'
            inactive:
                foreground: '#cdd6f4'
                background: '#45475a'

        input_method_editor:
            foreground: '#1e1e2e'
            background: '#f38ba8'

        normal:
            black:   '#45475a'
            red:     '#f38ba8'
            green:   '#a6e3a1'
            yellow:  '#f9e2af'
            blue:    '#89b4fa'
            magenta: '#cba6f7'
            cyan:    '#94e2d5'
            white:   '#bac2de'

        bright:
            black:   '#585b70'
            red:     '#f38ba8'
            green:   '#a6e3a1'
            yellow:  '#f9e2af'
            blue:    '#89b4fa'
            magenta: '#cba6f7'
            cyan:    '#94e2d5'
            white:   '#cdd6f4'

input_mapping:
    - { mods: [Alt]               , key: 'Enter'                 , action: ToggleFullscreen }
    - { mods: []                  , key: 'Escape'                , action: CancelSelection, mode: 'Insert|Select' }
    - { mods: [Shift]             , key: 'DownArrow'             , action: ScrollOneDown }
    - { mods: [Shift]             , key: 'End'                   , action: ScrollToBottom }
    - { mods: [Shift]             , key: 'Home'                  , action: ScrollToTop }
    - { mods: [Shift]             , key: 'PageDown'              , action: ScrollPageDown }
    - { mods: [Shift]             , key: 'PageUp'                , action: ScrollPageUp }
    - { mods: [Shift]             , key: 'UpArrow'               , action: ScrollOneUp }
    - { mods: []                  , key: 'F3'                    , action: FocusNextSearchMatch, mode: 'Search' }
    - { mods: [Shift]             , key: 'F3'                    , action: FocusPreviousSearchMatch, mode: 'Search' }
    - { mods: [Shift]             , key: 'LeftArrow'             , action: SwitchToTabLeft }
    - { mods: [Shift]             , key: 'RightArrow'            , action: SwitchToTabRight }
    - { mods: [Alt,Control]       , key: ','                     , action: ToggleInputMethodHandling }
    - { mods: [Shift,Control]     , key: '-'                     , action: DecreaseFontSize }
    - { mods: [Shift,Control]     , key: '_'                     , action: DecreaseFontSize }
    - { mods: [Shift,Control]     , key: 'N'                     , action: NewTerminal }
    - { mods: [Alt,Control]       , key: 'V'                     , action: PasteClipboard }
    - { mods: [Shift,Control]     , key: 'V'                     , action: PasteClipboard }
    - { mods: [Control]           , key: '0'                     , action: ResetFontSize }
    - { mods: [Shift,Control]     , key: 'T'                     , action: CreateNewTab }
    - { mods: [Alt]               , key: '1'                     , action: SwitchToTab, position: 1 }
    - { mods: [Alt]               , key: '2'                     , action: SwitchToTab, position: 2 }
    - { mods: [Alt]               , key: '3'                     , action: SwitchToTab, position: 3 }
    - { mods: [Alt]               , key: '4'                     , action: SwitchToTab, position: 4 }
    - { mods: [Alt]               , key: '5'                     , action: SwitchToTab, position: 5 }
    - { mods: [Alt]               , key: '6'                     , action: SwitchToTab, position: 6 }
    - { mods: [Alt]               , key: '7'                     , action: SwitchToTab, position: 7 }
    - { mods: [Alt]               , key: '8'                     , action: SwitchToTab, position: 8 }
    - { mods: [Alt]               , key: '9'                     , action: SwitchToTab, position: 9 }
    - { mods: [Alt]               , key: '0'                     , action: SwitchToTab, position: 10 }
    - { mods: [Control]           , key: 'C'                     , action: CopySelection, mode: 'Insert|Select' }
    - { mods: [Control]           , key: 'C'                     , action: CancelSelection, mode: 'Insert|Select' }
    - { mods: [Control]           , key: 'V'                     , action: PasteClipboard, mode: 'Insert|Select' }
    - { mods: [Control]           , key: 'V'                     , action: CancelSelection, mode: 'Insert|Select' }
    - { mods: [Shift,Control]     , key: ','                     , action: OpenConfiguration }
    - { mods: [Shift,Control]     , key: ' '                     , action: ViNormalMode, mode: 'Insert' }
    - { mods: [Shift,Control]     , key: 'Q'                     , action: Quit }
    - { mods: [Alt,Control]       , key: 'K'                     , action: ScrollMarkUp, mode: '~AltScreen' }
    - { mods: [Alt,Control]       , key: 'J'                     , action: ScrollMarkDown, mode: '~AltScreen' }
    - { mods: [Alt,Control]       , key: 'O'                     , action: OpenFileManager }
    - { mods: [Alt,Control]       , key: '.'                     , action: ToggleStatusLine }
    - { mods: [Shift,Control]     , key: 'F'                     , action: SearchReverse }
    - { mods: [Shift,Control]     , key: 'H'                     , action: NoSearchHighlight }
    - { mods: [Shift,Control]     , key: 'U'                     , action: HintMode }
    - { mods: [Control]           , mouse: Left                  , action: FollowHyperlink }
    - { mods: []                  , mouse: Middle                , action: PasteSelection }
    - { mods: []                  , mouse: WheelDown             , action: ScrollDown }
    - { mods: []                  , mouse: WheelUp               , action: ScrollUp }
    - { mods: [Alt]               , mouse: WheelDown             , action: DecreaseOpacity }
    - { mods: [Alt]               , mouse: WheelUp               , action: IncreaseOpacity }
    - { mods: [Control]           , mouse: WheelDown             , action: DecreaseFontSize }
    - { mods: [Control]           , mouse: WheelUp               , action: IncreaseFontSize }
    - { mods: [Shift]             , mouse: WheelDown             , action: ScrollPageDown }
    - { mods: [Shift]             , mouse: WheelUp               , action: ScrollPageUp }
