# Fuzzel app launcher — default config
# Catppuccin Mocha theme

[main]
font=Noto Sans:size=12
dpi-aware=auto
icon-theme=Papirus-Dark
icons-enabled=yes
prompt=❯ 
placeholder=Type to search...
match-mode=fuzzy
sort-result=yes
anchor=center
width=40
lines=15
horizontal-pad=40
vertical-pad=8
layer=overlay

[colors]
background=1e1e2eff
text=cdd6f4ff
prompt=89b4faff
placeholder=6c7086ff
input=cdd6f4ff
match=89b4faff
selection=45475add
selection-text=cdd6f4ff
selection-match=89b4faff
border=585b70ff

[border]
width=2
radius=12
