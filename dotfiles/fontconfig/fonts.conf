<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <!-- Font rendering settings -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintfull</const></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
  </match>

  <!-- Subpixel rendering for LCD monitors -->
  <match target="font">
    <edit name="rgba" mode="assign" binding="same">
      <const>rgb</const>
    </edit>
  </match>

  <!-- Font substitution: prefer Noto Sans for sans-serif -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Inter</family>
      <family>Liberation Sans</family>
      <family>DejaVu Sans</family>
    </prefer>
  </alias>

  <!-- Font substitution: prefer Noto Sans Mono for monospace -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Noto Sans Mono</family>
      <family>Liberation Mono</family>
      <family>DejaVu Sans Mono</family>
    </prefer>
  </alias>

  <!-- Font substitution: prefer Noto Serif for serif -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Liberation Serif</family>
      <family>DejaVu Serif</family>
    </prefer>
  </alias>

  <!-- CJK font substitution -->
  <alias>
    <family>sans-serif:lang=zh</family>
    <prefer>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans CJK</family>
      <family>WenQuanYi Micro Hei</family>
    </prefer>
  </alias>

  <alias>
    <family>sans-serif:lang=ja</family>
    <prefer>
      <family>Noto Sans CJK JP</family>
      <family>Noto Sans CJK</family>
      <family>WenQuanYi Micro Hei</family>
    </prefer>
  </alias>

  <alias>
    <family>sans-serif:lang=ko</family>
    <prefer>
      <family>Noto Sans CJK KR</family>
      <family>Noto Sans CJK</family>
      <family>WenQuanYi Micro Hei</family>
    </prefer>
  </alias>

  <!-- Emoji font substitution -->
  <alias>
    <family>emoji</family>
    <prefer>
      <family>Noto Color Emoji</family>
      <family>Twemoji</family>
    </prefer>
  </alias>

  <!-- Disable bitmap fonts for TrueType/OpenType -->
  <selectfont>
    <rejectfont>
      <pattern>
        <patelt name="family">
          <string>Bitmap</string>
        </patelt>
      </pattern>
    </rejectfont>
  </selectfont>

</fontconfig>
